name: Build, Test & Publish

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  publish:
    name: Pack & Publish to Gitea NuGet
    runs-on: ubuntu-latest
    needs: build-test
    # Only publish on push to develop or main (not PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Calculate CalVer
        id: ver
        run: |
          # Format: YYYY.MMDD.run_number  →  e.g. 2026.0523.42
          VERSION=$(date +'%Y.%m%d').${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build (versioned)
        run: |
          dotnet build --configuration Release --no-restore \
            -p:Version=${{ steps.ver.outputs.VERSION }}

      - name: Pack
        run: |
          dotnet pack src/lib/LowlandTech.TinyTools.csproj \
            --configuration Release --no-build \
            --output ./artifacts \
            -p:PackageVersion=${{ steps.ver.outputs.VERSION }}

      - name: Add Gitea NuGet source
        run: |
          dotnet nuget add source \
            --name gitea \
            --username foundry-admin \
            --password "${{ secrets.NUGET_TOKEN }}" \
            --store-password-in-clear-text \
            https://git.lowlandtech.com/api/packages/tinytools/nuget/index.json

      - name: Publish to Gitea NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source gitea \
            --skip-duplicate
